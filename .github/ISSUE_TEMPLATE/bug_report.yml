name: Bug Report
description: File a bug report for MazeEconomy
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting an issue! Please provide as much detail as possible.
  - type: input
    id: version
    attributes:
      label: MazeEconomy Version
      description: Which version of MazeEconomy are you running? (e.g., 1.0.0)
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: server_software
    attributes:
      label: Server Software
      description: What server software and version are you using? (e.g., Paper 1.21.1)
      placeholder: "Paper 1.21.1"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console Errors / Logs
      description: Please paste any relevant console errors here using code blocks.
      render: shell
    validations:
      required: false
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
    validations:
      required: true
